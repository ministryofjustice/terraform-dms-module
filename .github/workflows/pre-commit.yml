name: prek-like-ci-cd

on:
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.9.8

      # Pull modules and such, so pre-commit does not fail
      - name: Terraform init
        run: terraform init -input=false

      - name: Install tflint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: latest

      - name: Install checkov
        run: pip install --upgrade pip checkov

      - name: Install prek
        run: pip install prek

      - name: Cache prek
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.0
        with:
          path: ~/.cache/prek
          key: prek-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            prek-

      - name: Run prek
        run: prek run --all-files
