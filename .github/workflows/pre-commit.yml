name: prek-like-ci-cd

on:
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      # Pull modules and such, so pre-commit does not fail
      - name: Terraform init
        run: terraform init -input=false

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.5
        with:
          cache: true
          version: v0.69.2

      - name: Install Trivy
        run: exit 0 # trivy-action step removed
      - name: Install checkov
        run: pip install --upgrade pip checkov

      - name: Install prek
        run: pip install prek

      - name: Cache prek
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            prek-

      - name: Run prek
        run: prek run --all-files
